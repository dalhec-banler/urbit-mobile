name: Launcher

on:
  push:
    branches: [main, develop]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'launcher/**'
      - '.github/workflows/launcher.yml'

jobs:
  build:
    name: Build Launcher APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: launcher-debug
          path: launcher/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: launcher-release
          path: launcher/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: launcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint || true

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: launcher/app/build/reports/lint-results-*.html
          if-no-files-found: ignore
