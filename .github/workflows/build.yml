name: Build

on:
  push:
    branches: [main, develop]
    tags: ['v*', 'poc-*']
  pull_request:
    branches: [main, develop]

env:
  ZIG_VERSION: "0.15.2"
  VERE_BRANCH: "msl/64"

jobs:
  build-vere:
    name: Build vere (aarch64-linux-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          curl -LO https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz
          tar -xf zig-x86_64-linux-${{ env.ZIG_VERSION }}.tar.xz
          echo "$PWD/zig-x86_64-linux-${{ env.ZIG_VERSION }}" >> $GITHUB_PATH

      - name: Clone vere (msl/64)
        run: |
          git clone -b ${{ env.VERE_BRANCH }} --depth 1 https://github.com/urbit/vere.git

      - name: Apply patches
        run: |
          for patch in patches/*.patch; do
            if [ -f "$patch" ]; then
              echo "Applying: $patch"
              (cd vere && git apply "../$patch")
            fi
          done

      - name: Build vere
        run: |
          cd vere
          zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseFast
          ls -la zig-out/aarch64-linux-musl/

      - name: Patch DNS for Android
        run: |
          python3 scripts/patch-dns.py vere/zig-out/aarch64-linux-musl/urbit
          ls -la vere/zig-out/aarch64-linux-musl/

      - name: Strip binary
        run: |
          # Use llvm-strip for cross-architecture stripping
          sudo apt-get install -y llvm
          llvm-strip vere/zig-out/aarch64-linux-musl/urbit-patched
          ls -la vere/zig-out/aarch64-linux-musl/

      - name: Get vere version
        id: vere-version
        run: |
          cd vere
          COMMIT=$(git rev-parse --short HEAD)
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Built from vere commit: $COMMIT"

      - name: Upload vere binary
        uses: actions/upload-artifact@v4
        with:
          name: urbit-aarch64-linux-musl
          path: vere/zig-out/aarch64-linux-musl/urbit-patched
          if-no-files-found: error

  build-module:
    name: Build Magisk module
    runs-on: ubuntu-latest
    needs: build-vere
    steps:
      - uses: actions/checkout@v4

      - name: Download vere binary
        uses: actions/download-artifact@v4
        with:
          name: urbit-aarch64-linux-musl
          path: aosp/magisk-module/common/

      - name: Rename binary
        run: |
          mv aosp/magisk-module/common/urbit-patched aosp/magisk-module/common/urbit
          chmod +x aosp/magisk-module/common/urbit

      - name: Build module zip
        run: |
          cd aosp/magisk-module
          zip -r ../../urbit-vere-module.zip . \
            -x '*.DS_Store' \
            -x '*/.git/*' \
            -x '*.gitkeep' \
            -x '.gitignore'
          ls -la ../../urbit-vere-module.zip

      - name: Upload Magisk module
        uses: actions/upload-artifact@v4
        with:
          name: urbit-vere-module
          path: urbit-vere-module.zip
          if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build-vere, build-module]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download vere binary
        uses: actions/download-artifact@v4
        with:
          name: urbit-aarch64-linux-musl
          path: ./release/

      - name: Download Magisk module
        uses: actions/download-artifact@v4
        with:
          name: urbit-vere-module
          path: ./release/

      - name: Rename artifacts
        run: |
          cd release
          mv urbit-patched urbit-aarch64-linux-musl
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/urbit-aarch64-linux-musl
            release/urbit-vere-module.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'poc') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
